services:
  # ─── Backend: Flask API ───────────────────────────────────────────────────────
  - type: web
    name: agro-genix-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agro-genix-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # ─── Frontend: Vite/React Static Site ─────────────────────────────────────────
  - type: web
    name: agro-genix-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      # Allow SPA routing (all unknown paths → index.html)
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://agro-genix-backend.onrender.com
      # Add your Supabase keys here:
      # - key: VITE_SUPABASE_URL
      #   sync: false
      # - key: VITE_SUPABASE_ANON_KEY
      #   sync: false

databases:
  - name: agro-genix-db
    databaseName: agro_genix
    user: agro_genix_user
    plan: free
